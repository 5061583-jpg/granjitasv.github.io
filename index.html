<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#111;
            font-family:Arial, sans-serif;
        }

        .login{
            background:#222;
            padding:30px;
            border-radius:10px;
            width:300px;
            text-align:center;
            box-shadow:0 0 15px red;
        }

        h2{
            color:red;
            margin-bottom:20px;
        }

        input[type="text"],
        input[type="password"]{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        input[type="submit"]{
            width:95%;
            padding:10px;
            background:red;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        input[type="submit"]:hover{
            background:#cc0000;
        }
    </style>
</head>
<body>

    <div class="login">
        <h2>Iniciar Sesión</h2>

        <form action="index3.php" method="post">

            <input type="text" name="nombre" placeholder="Ingrese su nombre" required>

            <input type="password" name="contrasena" placeholder="Ingrese su contraseña" required>

            <input type="submit" value="Ingresar">

        </form>
    </div>

</body>
</html>
